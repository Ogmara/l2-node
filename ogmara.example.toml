# Ogmara L2 Node — Example Configuration
#
# Copy to ogmara.toml and edit for your setup.
# Generate a default config with: ogmara-node init

[node]
data_dir = "./data"

[network]
listen_port = 41720
bootstrap_nodes = []
max_peers = 50
enable_mdns = true
# Network isolation: nodes on different networks refuse to peer.
# Auto-detected from klever.node_url if not set. Valid: "testnet", "mainnet".
# network_id = "testnet"

[klever]
# Choose ONE network below — uncomment the block you want and comment out the other.

# --- Testnet (for testing before going to mainnet) ---
node_url = "https://node.testnet.klever.org"
api_url = "https://api.testnet.klever.org"
contract_address = "klv1qqqqqqqqqqqqqpgq0ja2j7xwz843ryfsk9vlz6xzsaak590h6pgq7nwr02"

# --- Mainnet ---
# node_url = "https://node.mainnet.klever.org"
# api_url = "https://api.mainnet.klever.org"
# contract_address = "klv1qqqqqqqqqqqqqpgq8c9yag9vuc2pe64fwvqsq9e8ul8w5zuglf5qfgh7z3"

scan_interval_ms = 60000    # 60s — safe for rate limits

[ipfs]
# Local IPFS (default): node and IPFS on the same server
api_url = "http://127.0.0.1:5001"
gateway_url = "http://127.0.0.1:8081"
# Remote IPFS: point to the remote server (must be secured — see docs/specs/04-ipfs.md §7.2)
# api_url = "http://10.0.0.2:5001"       # via WireGuard tunnel
# gateway_url = "http://10.0.0.2:8081"   # via WireGuard tunnel
max_upload_size_mb = 50
auto_thumbnail = true

[api]
# Set to "0.0.0.0" to accept connections from all interfaces
listen_addr = "127.0.0.1"
listen_port = 41721
# Public URL where this node's API is reachable (shown in network node list)
# public_url = "https://node.ogmara.org"
cors_origins = ["http://localhost:*"]
rate_limit_per_ip = 100

[api.admin]
enabled = true
dashboard = true

[storage]
engine = "rocksdb"
max_db_size_gb = 50
pinned_channels = []

[cache]
ttl_seconds = 86400
max_size_mb = 1024
auto_pin_on_interaction = true

[push_gateway]
enabled = false
url = ""             # e.g., "http://localhost:41722" (gateway appends /push)
auth_token = ""      # must match OGMARA_PUSH_SECRET on the push gateway

[logging]
level = "info"
format = "json"

[alerts]
enabled = false

[alerts.telegram]
enabled = false
bot_token = ""
chat_id = ""

[alerts.discord]
enabled = false
webhook_url = ""

[alerts.webhook]
enabled = false
url = ""

[alerts.thresholds]
klever_disconnect_seconds = 60
ipfs_disconnect_seconds = 30
min_peers = 3
max_disk_usage_percent = 90
max_memory_usage_percent = 85
anchor_overdue_multiplier = 2.0
sc_sync_max_lag_blocks = 100
rate_limit_alert_per_min = 100
failed_sig_alert_per_min = 50

[alerts.cooldown]
seconds = 300
